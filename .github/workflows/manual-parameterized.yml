name: Parameterized On-Demand Workflow

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - api
          - frontend
          - database
      version:
        description: "Version tag"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_message: ${{ steps.build-step.outputs.message }}
    steps:
      - name: Build step
        id: build-step
        run: |
          echo "message=Built ${{ github.event.inputs.service }}:${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy step
        run: echo "Deploying ${{ needs.build.outputs.build_message }}"

  summary:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Execution Summary
        run: |
          echo "Workflow Summary:"
          echo "Service: ${{ github.event.inputs.service }}"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Build Output: ${{ needs.build.outputs.build_message }}"
          echo "Deployment completed successfully!"

