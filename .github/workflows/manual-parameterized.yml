name: Multi-Environment Deployment

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Name of the application to deploy"
        required: true
        type: string
      run_validation:
        description: "Run validation before deployment"
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_message: ${{ steps.build-step.outputs.message }}
    steps:
      - name: Build step
        id: build-step
        run: |
          echo "message=Built ${{ github.event.inputs.application_name }}" >> $GITHUB_OUTPUT

  validate:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.run_validation == 'true' }}
    steps:
      - name: Validation step
        run: echo "Running validation for ${{ github.event.inputs.application_name }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, validate]
    steps:
      - name: Deploy step
        run: echo "Deploying ${{ needs.build.outputs.build_message }}"

  summary:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Execution Summary
        run: |
          echo "Workflow Summary:"
          echo "Application: ${{ github.event.inputs.application_name }}"
          echo "Run Validation: ${{ github.event.inputs.run_validation }}"
          echo "Build Output: ${{ needs.build.outputs.build_message }}"
          echo "Deployment completed successfully!"

