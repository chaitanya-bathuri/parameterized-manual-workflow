name: Parameterized Manual Workflow

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Name of the application to deploy"
        required: true
        type: string
      run_validation:
        description: "Run validation before deployment"
        required: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.set-status.outputs.status }}
    steps:
      - name: Print inputs
        run: |
          echo "Application Name: ${{ github.event.inputs.application_name }}"
          echo "Run Validation: ${{ github.event.inputs.run_validation }}"

      - name: Set validation status
        id: set-status
        run: |
          if [ "${{ github.event.inputs.run_validation }}" == "true" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT

  summary:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ needs.validate.outputs.validation_status == 'success' }}
    steps:
      - name: Execution Summary
        run: |
          echo "Final Execution Summary:"
          echo "Application: ${{ github.event.inputs.application_name }}"
          echo "Validation Status: ${{ needs.validate.outputs.validation_status }}"
          echo "Workflow completed successfully!"
